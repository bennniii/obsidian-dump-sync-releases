name: release
on:
  push:
    branches: [main]
    paths:
      - manifest.json
      - main.js
      - .github/workflows/release.yml
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: create release for the manifest version (skip if it exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f main.js && test -f manifest.json
          TAG="$(python3 -c 'import json;print(json.load(open("manifest.json"))["version"])')"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists — nothing to do"
            exit 0
          fi
          gh release create "$TAG" main.js manifest.json \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "dump-sync $TAG" \
            --notes "dump-sync $TAG — install via BRAT (this repo). Built from the dump monorepo (apps/obsidian)."
